<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R204/R205 — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e0f;
    --surface: #161718;
    --surface2: #1e2021;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --muted: #8a8782;
    --accent: #c9a96e;
    --accent2: #e8c88a;
    --green: #5a9e6f;
    --red: #c0564e;
    --blue: #5b8ab5;
    --card-front: #1a1b1d;
    --card-back: #181c1a;
    --flip-duration: 0.55s;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Header */
  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  header span.sub {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 0;
    padding: 0.75rem 2.5rem;
    border-bottom: 0.5px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
    gap: 1.5rem;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .stat-item strong {
    color: var(--text);
    font-size: 1rem;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .progress-bar {
    flex: 1;
    min-width: 160px;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    gap: 0.25rem;
    padding: 1rem 2.5rem 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--muted);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0d0e0f; }

  /* Card counter */
  .card-counter {
    padding: 1.25rem 2.5rem 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* Main card area */
  .card-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 2.5rem 2rem;
    min-height: 420px;
  }

  /* 3D flip card */
  .card-scene {
    width: 100%;
    max-width: 680px;
    height: 300px;
    perspective: 1200px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform var(--flip-duration) cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 12px;
    padding: 2rem 2.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 0.5px solid var(--border2);
    overflow: hidden;
  }

  .card-front {
    background: var(--card-front);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    border-color: rgba(201, 169, 110, 0.25);
  }

  .card-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .card-back .card-label {
    color: var(--accent);
  }

  .card-question {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem;
    line-height: 1.4;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .card-answer {
    font-size: 0.95rem;
    line-height: 1.65;
    color: var(--text);
  }

  .card-answer strong {
    color: var(--accent2);
    font-weight: 600;
  }

  .card-hint {
    position: absolute;
    bottom: 1.25rem;
    right: 1.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .flip-icon {
    width: 14px;
    height: 14px;
    opacity: 0.5;
  }

  /* Corner decoration */
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 60px;
    background: linear-gradient(225deg, rgba(201,169,110,0.06) 0%, transparent 60%);
    border-radius: 0 12px 0 0;
    pointer-events: none;
  }

  /* Action buttons */
  .card-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
    width: 100%;
    max-width: 680px;
  }

  .btn {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--muted);
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
  .btn:active { transform: scale(0.97); }

  .btn-wrong { color: #c0564e; border-color: rgba(192,86,78,0.3); }
  .btn-wrong:hover { background: rgba(192,86,78,0.1); border-color: rgba(192,86,78,0.5); color: #e07a73; }

  .btn-correct { color: #5a9e6f; border-color: rgba(90,158,111,0.3); }
  .btn-correct:hover { background: rgba(90,158,111,0.1); border-color: rgba(90,158,111,0.5); color: #7dc494; }

  .btn-skip { color: var(--muted); }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
    width: 100%;
    max-width: 680px;
    justify-content: space-between;
  }

  .btn-nav {
    padding: 0.5rem 1.25rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    transition: all 0.18s;
  }
  .btn-nav:hover { color: var(--text); border-color: var(--border2); }

  /* Category badge on card */
  .category-badge {
    position: absolute;
    top: 1.25rem;
    right: 1.5rem;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
    border: 0.5px solid var(--border);
  }

  /* Mastery grid */
  .mastery-section {
    padding: 1.5rem 2.5rem;
    border-top: 0.5px solid var(--border);
  }

  .mastery-title {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .mastery-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .mastery-dot {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .mastery-dot:hover { border-color: var(--border2); transform: scale(1.1); }
  .mastery-dot.correct { background: rgba(90,158,111,0.35); border-color: rgba(90,158,111,0.5); }
  .mastery-dot.wrong { background: rgba(192,86,78,0.25); border-color: rgba(192,86,78,0.4); }
  .mastery-dot.current { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  /* Empty state / completion */
  .completion {
    text-align: center;
    padding: 3rem 2rem;
  }
  .completion h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  .completion p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .btn-restart {
    padding: 0.75rem 2rem;
    border-radius: 8px;
    background: var(--accent);
    color: #0d0e0f;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }
  .btn-restart:hover { background: var(--accent2); transform: translateY(-1px); }

  /* Shuffle indicator */
  .mode-badge {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    background: rgba(201,169,110,0.15);
    color: var(--accent);
    border: 0.5px solid rgba(201,169,110,0.3);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: auto;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    header, .stats-bar, .tabs, .card-area, .card-counter, .mastery-section {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .card-scene { height: 260px; }
    .card-question { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Stratégies de communication</h1>
  <span class="sub">R204 · R205 · BUT MMI S2</span>
  <span class="mode-badge" id="shuffleBtn" onclick="toggleShuffle()" title="Activer/désactiver l'ordre aléatoire">🔀 shuffle</span>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-dot" style="background:#5a9e6f"></span>
    <strong id="correctCount">0</strong> correctes
  </div>
  <div class="stat-item">
    <span class="stat-dot" style="background:#c0564e"></span>
    <strong id="wrongCount">0</strong> à revoir
  </div>
  <div class="stat-item">
    <span class="stat-dot" style="background:#8a8782"></span>
    <strong id="totalCount">0</strong> total
  </div>
  <div class="progress-bar" style="margin-left: auto;">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <span style="font-size:0.75rem; color:var(--muted); font-family:'DM Mono',monospace" id="progressPct">0%</span>
</div>

<div class="tabs" id="tabsContainer">
  <button class="tab active" onclick="filterCategory('all')">Tout</button>
</div>

<div class="card-counter" id="cardCounter">Carte 1 / 0</div>

<div class="card-area" id="cardArea">
  <div class="card-scene" id="cardScene" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-label">Question</div>
        <div class="card-question" id="cardQuestion">Chargement...</div>
        <span class="category-badge" id="cardCategory">—</span>
        <div class="card-hint">
          <svg class="flip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
          cliquer pour retourner
        </div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Réponse</div>
        <div class="card-answer" id="cardAnswer">—</div>
        <span class="category-badge" id="cardCategoryBack" style="border-color:rgba(201,169,110,0.2); color:var(--accent)">—</span>
      </div>
    </div>
  </div>

  <div class="card-actions" id="cardActions" style="display:none">
    <button class="btn btn-wrong" onclick="markCard(false)">✗ À revoir</button>
    <button class="btn btn-skip" onclick="nextCard()">→ Passer</button>
    <button class="btn btn-correct" onclick="markCard(true)">✓ Compris</button>
  </div>

  <div class="nav-row">
    <button class="btn-nav" onclick="prevCard()">← Précédent</button>
    <button class="btn-nav" onclick="resetDeck()">↺ Réinitialiser</button>
    <button class="btn-nav" onclick="nextCard()">Suivant →</button>
  </div>
</div>

<div class="mastery-section">
  <div class="mastery-title">Progression carte par carte</div>
  <div class="mastery-grid" id="masteryGrid"></div>
</div>

<script>
const STORAGE_KEY = 'r204_r205_flashcards_v1';

const ALL_CARDS = [
  // === CM2 : Pub-média ===
  {
    cat: 'Pub-média & déclin',
    q: 'Quelles sont les 3 grandes raisons du déclin de la publicité-média ?',
    a: '<strong>1. Émiettement des médias</strong> (multiplication des chaînes TV → audience fragmentée)<br><strong>2. Médias interactifs</strong> (remise en cause du modèle unidirectionnel)<br><strong>3. Critique de la société de consommation</strong> (42% des français rejettent la pub, mouvement anti-pub, pollution visuelle)'
  },
  {
    cat: 'Pub-média & déclin',
    q: 'Qu\'est-ce que le "branding" par opposition à la pub-produit ?',
    a: 'Le <strong>branding</strong> consiste à valoriser la marque dans son ensemble (image, valeurs, storytelling) plutôt que de promouvoir un produit spécifique. On suppose que l\'image de marque bénéficie à tous les produits.<br>Ex : Danone dépense autant en pub-produit qu\'en <strong>communication corporate</strong>.'
  },
  {
    cat: 'Pub-média & déclin',
    q: 'Quelles sont les 3 étapes d\'une campagne de publicité-média ?',
    a: '<strong>1. Briefing créatif</strong> : description du contexte, cibles, objectifs, contraintes<br><strong>2. Production du message</strong> : élaboration, copy strategy, création publicitaire, pré-tests<br><strong>3. Médiaplanning</strong> : choix des canaux/médias, plan médias, négociation et achat d\'espaces'
  },
  {
    cat: 'Pub-média & déclin',
    q: 'Quelles sont les caractéristiques et spécificités de chaque grand média (TV, Presse, Affichage, Radio, Cinéma) ?',
    a: '<strong>TV</strong> : très onéreux, puissant, ciblage par thème/horaire<br><strong>Presse</strong> : bon ciblage par multiplicité des titres, complicité avec l\'audience<br><strong>Affichage</strong> : sélectivité géographique parfaite, contesté pour pollution visuelle<br><strong>Radio</strong> : conso domestique/auto, ciblage thématique et géographique<br><strong>Cinéma</strong> : qualité/prestige, faibles investissements, spots longs, fort coût/audience'
  },
  {
    cat: 'Pub-média & déclin',
    q: 'Qu\'est-ce que la "critique de l\'École de Francfort" appliquée à la pub-média ? Illustrer avec la citation de Patrick Le Lay.',
    a: 'Critique : la pub <strong>appauvrit le contenu des médias</strong> car ceux-ci doivent "préparer" des cerveaux disponibles pour les annonceurs.<br><br>Patrick Le Lay (ex-PDG TF1) : <em>ce que TF1 vend à Coca-Cola, c\'est du <strong>temps de cerveau humain disponible</strong></em>. Les émissions divertissent pour rendre le spectateur réceptif aux pubs.'
  },
  {
    cat: 'Pub-média & déclin',
    q: 'Quelles sont les 3 stratégies créatives pour contourner la désaffection du public envers la pub ?',
    a: '<strong>1. Mises en scène spectaculaires</strong> sans affichage de marque (ex. bébés Evian)<br><strong>2. Marketing olfactif</strong> + communication globale avec relais digital ("sites compagnons")<br><strong>3. "Coup publicitaire"</strong> : se faire interdire une pub pour faire le buzz (ex. IKEA, pub sadomaso)'
  },
  {
    cat: 'Pub-média & déclin',
    q: 'Qu\'est-ce que la "communication corporate" ?',
    a: 'Communication orientée vers l\'<strong>entreprise comme institution</strong> (et non vers ses produits). Elle valorise l\'entreprise et ses valeurs, son engagement sociétal, son histoire. C\'est distinct du branding produit. Souvent associée au <strong>RSE</strong> (responsabilité sociale).'
  },

  // === Types de communication ===
  {
    cat: 'Types de com',
    q: 'Définir et distinguer : communication push, pull, relayée et entre consommateurs.',
    a: '<strong>Push</strong> : message non sollicité envoyé par la marque (pub TV, bannière, catalogue boîte aux lettres)<br><strong>Pull</strong> : com "demandée" par le client (recherche Google, demande info en magasin, lien sponsorisé)<br><strong>Relayée</strong> : via influenceurs, relations-presse, community management<br><strong>Entre consommateurs</strong> : bouche-à-oreille, buzz, UGC'
  },
  {
    cat: 'Types de com',
    q: 'Qu\'est-ce que le "User Generated Content" (UGC) et pourquoi est-il précieux pour les marques ?',
    a: 'Le <strong>UGC</strong> = commentaires, avis, publications générés par les internautes eux-mêmes (médias gagnés).<br>Précieux car : <strong>gage de crédibilité</strong> (promotion par un tiers objectivant) et <strong>notoriété gratuite</strong>.<br>Inconvénient : communication par nature <strong>moins maîtrisable</strong> par la marque.'
  },
  {
    cat: 'Types de com',
    q: 'Quelle est la différence entre "médias possédés", "médias achetés" et "médias gagnés" ?',
    a: '<strong>Possédés</strong> : médias appartenant à l\'entreprise (site web, blog, app). Pas de coût d\'espace.<br><strong>Achetés</strong> : espaces achetés sur des sites tiers (bandeau, pop-up, liens sponsorisés). Comparable à la pub-média classique.<br><strong>Gagnés</strong> : UGC, mentions spontanées, buzz. Crédibilité maximale, maîtrise minimale.'
  },

  // === Modèles économiques ===
  {
    cat: 'Modèles économiques du web',
    q: 'Quels sont les 2 grands modèles économiques sur Internet (modèle marchand vs gratuité) ?',
    a: '<strong>Modèle marchand</strong> : vente directe de produits/services (e-commerce Amazon, accès payant presse). Fort CA, souvent peu de bénéfices pour les géants.<br><strong>Modèle de la gratuité</strong> : accès gratuit au contenu mais monétisation via pub, freemium (Spotify), ou dons (Wikipedia).'
  },
  {
    cat: 'Modèles économiques du web',
    q: 'Pourquoi le modèle de la gratuité est-il difficile à maintenir, et quels sont ses gagnants ?',
    a: 'Problèmes : nécessite <strong>d\'élargir constamment l\'offre de contenus</strong>, investissement > revenus de monétisation → <strong>explosion de la bulle internet</strong>.<br><br>Gagnants : les <strong>régies publicitaires intermédiaires</strong> (ex. Google) qui font l\'interface entre annonceurs et éditeurs, et sont aussi éditrices de contenus.'
  },

  // === Display & Search ===
  {
    cat: 'Display & Search',
    q: 'Qu\'est-ce que le "display" ? Quels sont ses 2 modes de tarification ?',
    a: 'Le <strong>display</strong> = transposition de la pub-média classique : achat d\'espaces sur des sites pour afficher bannières/vidéos publicitaires.<br><br><strong>CPM</strong> : coût pour mille affichages (ex. 30€/1000 bannières) → insiste sur l\'exposition<br><strong>CPC</strong> : coût par clic (ex. 0,25€/clic) → prix aux enchères (Google premier prestataire)'
  },
  {
    cat: 'Display & Search',
    q: 'Qu\'est-ce que le "search" (SEA) ? Pourquoi est-il plus efficace que le display pour la conversion ?',
    a: 'Le <strong>search</strong> = liens sponsorisés dans les résultats moteurs de recherche.<br>Technique <strong>pull</strong> : s\'appuie sur l\'activité de la cible (qui cherche activement). Présentation discrète (un lien).<br>Plus efficace car l\'internaute est déjà en intention d\'achat/information → <strong>meilleur taux de conversion</strong>.'
  },
  {
    cat: 'Display & Search',
    q: 'Pourquoi le taux de clic sur les bannières est-il si faible, et quand clique-t-on quand même ?',
    a: 'Taux de clic : <strong>0,1% à 0,5%</strong> (très faible).<br>On clique quand : <strong>intérêt pour le produit</strong>, esthétisme de la bannière, gain lié au clic (concours), ou <strong>erreur</strong>.<br>Meilleur taux : vidéos (mais rarement vues en entier → "taux de complétion"), et pubs dans les <strong>fils d\'actualité des réseaux sociaux</strong>.'
  },
  {
    cat: 'Display & Search',
    q: 'Qu\'est-ce que le SEO ("référencement naturel") et en quoi se distingue-t-il du SEA ?',
    a: '<strong>SEO</strong> (Search Engine Optimization) : classement "naturel" basé sur critères objectifs (mots-clés, nombre de backlinks, qualité du site). Gratuit mais long à construire.<br><strong>SEA</strong> : liens sponsorisés payants, positionnés en haut des résultats via enchères sur mots-clés. Seul le 1er lien a un bon taux de clic.'
  },
  {

let state = {
  deck: [],
  currentIndex: 0,
  isFlipped: false,
  scores: {},
  category: 'all',
  shuffle: false
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.scores = parsed.scores || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ scores: state.scores }));
  } catch(e) {}
}

function getCategories() {
  const cats = ['all', ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === state.category ? ' active' : '');
    btn.textContent = cat === 'all' ? `Tout (${ALL_CARDS.length})` : `${cat} (${ALL_CARDS.filter(c => c.cat === cat).length})`;
    btn.onclick = () => filterCategory(cat);
    container.appendChild(btn);
  });
}

function filterCategory(cat) {
  state.category = cat;
  state.currentIndex = 0;
  state.isFlipped = false;
  buildDeck();
  buildTabs();
  render();
}

function buildDeck() {
  let cards = cat => ALL_CARDS.filter(c => state.category === 'all' || c.cat === state.category);
  state.deck = cards();
  if (state.shuffle) {
    state.deck = [...state.deck].sort(() => Math.random() - 0.5);
  }
}

function flipCard() {
  state.isFlipped = !state.isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', state.isFlipped);
  document.getElementById('cardActions').style.display = state.isFlipped ? 'flex' : 'none';
}

function nextCard() {
  if (state.currentIndex < state.deck.length - 1) {
    state.currentIndex++;
    state.isFlipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
    document.getElementById('cardActions').style.display = 'none';
    render();
  }
}

function prevCard() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    state.isFlipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
    document.getElementById('cardActions').style.display = 'none';
    render();
  }
}

function markCard(correct) {
  const card = state.deck[state.currentIndex];
  const key = ALL_CARDS.indexOf(card);
  state.scores[key] = correct ? 'correct' : 'wrong';
  saveState();
  updateStats();
  updateMasteryGrid();
  nextCard();
}

function resetDeck() {
  state.scores = {};
  state.currentIndex = 0;
  state.isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('cardActions').style.display = 'none';
  saveState();
  render();
}

function toggleShuffle() {
  state.shuffle = !state.shuffle;
  const btn = document.getElementById('shuffleBtn');
  btn.style.background = state.shuffle ? 'rgba(201,169,110,0.3)' : 'rgba(201,169,110,0.15)';
  btn.textContent = state.shuffle ? '🔀 shuffle ON' : '🔀 shuffle';
  buildDeck();
  state.currentIndex = 0;
  state.isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('cardActions').style.display = 'none';
  render();
}

function updateStats() {
  const vals = Object.values(state.scores);
  const correct = vals.filter(v => v === 'correct').length;
  const wrong = vals.filter(v => v === 'wrong').length;
  const total = ALL_CARDS.length;
  const seen = vals.length;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('totalCount').textContent = total;
  const pct = Math.round((seen / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function updateMasteryGrid() {
  const grid = document.getElementById('masteryGrid');
  grid.innerHTML = '';
  ALL_CARDS.forEach((card, i) => {
    const dot = document.createElement('div');
    dot.className = 'mastery-dot';
    if (state.scores[i] === 'correct') dot.classList.add('correct');
    if (state.scores[i] === 'wrong') dot.classList.add('wrong');
    const deckIdx = state.deck.indexOf(card);
    if (deckIdx === state.currentIndex) dot.classList.add('current');
    dot.title = card.q.substring(0, 60) + '...';
    dot.onclick = () => {
      if (deckIdx !== -1) {
        state.currentIndex = deckIdx;
        state.isFlipped = false;
        document.getElementById('cardInner').classList.remove('flipped');
        document.getElementById('cardActions').style.display = 'none';
        render();
      }
    };
    grid.appendChild(dot);
  });
}

function render() {
  const total = state.deck.length;
  if (total === 0) return;
  const idx = state.currentIndex;
  const card = state.deck[idx];
  const globalIdx = ALL_CARDS.indexOf(card);

  document.getElementById('cardCounter').textContent = `Carte ${idx + 1} / ${total}`;
  document.getElementById('cardQuestion').textContent = card.q;
  document.getElementById('cardAnswer').innerHTML = card.a;
  document.getElementById('cardCategory').textContent = card.cat;
  document.getElementById('cardCategoryBack').textContent = card.cat;

  // Color based on score
  const scene = document.getElementById('cardScene');
  if (state.scores[globalIdx] === 'correct') {
    scene.style.filter = 'drop-shadow(0 0 8px rgba(90,158,111,0.15))';
  } else if (state.scores[globalIdx] === 'wrong') {
    scene.style.filter = 'drop-shadow(0 0 8px rgba(192,86,78,0.15))';
  } else {
    scene.style.filter = 'none';
  }

  updateStats();
  updateMasteryGrid();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (!state.isFlipped) flipCard(); else nextCard();
  }
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'f' || e.key === 'F') flipCard();
  if (e.key === 'c' && state.isFlipped) markCard(true);
  if (e.key === 'x' && state.isFlipped) markCard(false);
});

// Init
loadState();
buildDeck();
buildTabs();
render();
</script>
